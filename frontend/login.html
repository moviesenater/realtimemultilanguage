<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta http-equiv="Cache-Control" content="no-store" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<style>
body{background:#667eea;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif}
.container{background:white;padding:30px;border-radius:10px;text-align:center;width:300px}
input{margin:10px;padding:10px;width:90%}
button{padding:10px;background:#667eea;color:white;border:none;width:95%}
</style>
</head>
<body>

<div class="container">
<h2>Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p><a href="/signup">Signup</a></p>
</div>

<script>
window.onload=function(){
    let token=localStorage.getItem("token")
    if(token){window.location.href="/dashboard"}
}

async function login(){
    let username=document.getElementById("username").value
    let password=document.getElementById("password").value

    let res=await fetch('https://realtimemultilanguage-2.onrender.com/login'),{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username,password})
    })

    let data=await res.json()

    if(res.ok && data.token){
        localStorage.setItem("token",data.token)
        window.location.href="/dashboard"
    } else {
        alert(data.error)
    }
}
</script>

</body>
</html>
